<!-- 
    BLOG CARD TEMPLATE
    Copy this and paste it inside <div id="blogGrid"> in blog.html
    Replace ALL_CAPS text with your content
-->

<!-- Blog Post NUMBER -->
<article class="blog-article" data-category="YOUR_CATEGORY" data-title="YOUR_BLOG_TITLE">
    <img src="YOUR_IMAGE_URL" alt="YOUR_IMAGE_DESCRIPTION" style="width: 100%; height: 200px; object-fit: cover;">
    <div style="padding: var(--spacing-md);">
        <div style="display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-sm);">
            <!-- Use var(--primary-red) for red or var(--accent-gold) for gold -->
            <span
                style="background: var(--primary-red); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem;">YOUR_CATEGORY</span>
            <span style="color: var(--text-muted); font-size: 0.875rem;"><i class="far fa-calendar"></i>
                YOUR_DATE</span>
        </div>
        <h3 style="margin-bottom: var(--spacing-sm); color: var(--charcoal);">YOUR_BLOG_TITLE</h3>
        <p style="color: var(--text-muted); margin-bottom: var(--spacing-md);">YOUR_SHORT_DESCRIPTION (2-3 sentences)
        </p>
        <a href="blog-post-NUMBER.html" style="color: var(--primary-red); font-weight: 600; text-decoration: none;">Read
            More <i class="fas fa-arrow-right"></i></a>
    </div>
</article>
