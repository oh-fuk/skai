<!-- ✏️ APNA BLOG CARD YAHAN SE START -->
<article class="blog-article" data-category="Cloud Migration" data-title="Your Blog Title Here">

    <!-- 🖼️ IMAGE: Unsplash se image URL yahan paste karo -->
    <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=500&h=300&fit=crop" alt="Blog Post Image"
        style="width: 100%; height: 200px; object-fit: cover;">

    <div style="padding: var(--spacing-md);">

        <!-- 🏷️ CATEGORY & DATE -->
        <div style="display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-sm);">

            <!-- CATEGORY BADGE: Choose RED or GOLD -->
            <!-- RED CATEGORY (Cloud Migration, Best Practices) -->
            <span
                style="background: var(--primary-red); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem;">
                Cloud Migration
            </span>

            <!-- GOLD CATEGORY (AI & Automation, Analytics, Security) - UNCOMMENT IF NEEDED -->
            <!-- <span style="background: var(--accent-gold); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem;">
                AI & Automation
            </span> -->

            <!-- DATE: Apni date yahan change karo -->
            <span style="color: var(--text-muted); font-size: 0.875rem;">
                <i class="far fa-calendar"></i> April 30, 2024
            </span>
        </div>

        <!-- 📝 TITLE: Apna blog title yahan likho -->
        <h3 style="margin-bottom: var(--spacing-sm); color: var(--charcoal);">
            Your Amazing Blog Post Title Goes Here
        </h3>

        <!-- 📄 DESCRIPTION: Short description (2-3 lines) -->
        <p style="color: var(--text-muted); margin-bottom: var(--spacing-md);">
            Your short description goes here. Keep it 2-3 lines. This will appear as preview
            on the blog listing page. Make it interesting to attract readers!
        </p>

        <!-- 🔗 LINK: Apni blog post file ka naam yahan -->
        <a href="your-blog-post-file-name.html"
            style="color: var(--primary-red); font-weight: 600; text-decoration: none;">
            Read More <i class="fas fa-arrow-right"></i>
        </a>
    </div>
</article>
<!-- ✏️ APNA BLOG CARD YAHAN END -->


<!-- ═══════════════════════════════════════════════════════════════════════════
     INSTRUCTIONS - KAISE USE KAREIN
════════════════════════════════════════════════════════════════════════════

1. IMAGE URL:
   ─────────
   • Unsplash.com pe jao
   • Apni topic ki image search karo
   • Image ka URL copy karo
   • Line 19 mein paste karo
   • Format: https://images.unsplash.com/photo-XXXXX?w=500&h=300&fit=crop

2. CATEGORY:
   ─────────
   Choose one:
   
   RED CATEGORIES (Line 28-30):
   • Cloud Migration
   • Best Practices
   
   GOLD CATEGORIES (Line 33-35, uncomment karke use karo):
   • AI & Automation
   • Analytics
   • Security

3. DATE:
   ─────
   • Line 39 mein apni date change karo
   • Format: Month Day, Year
   • Example: April 30, 2024

4. TITLE:
   ─────
   • Line 45 mein apna blog title likho
   • Clear aur descriptive title use karo
   • 50-60 characters tak rakhne ki koshish karo

5. DESCRIPTION:
   ───────────
   • Line 50-51 mein short description likho
   • 2-3 lines mein summarize karo
   • Interesting banao taake log click karein

6. FILE LINK:
   ──────────
   • Line 56 mein apni blog post file ka naam likho
   • Example: my-awesome-blog-post.html
   • Lowercase use karo, spaces ki jagah hyphens (-)

════════════════════════════════════════════════════════════════════════════
